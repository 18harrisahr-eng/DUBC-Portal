<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUBC – Member Debt Portal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #fff; border-radius: 16px; border: 0.5px solid #e0e0d8; padding: 2rem; width: 100%; max-width: 480px; }
  .logo { text-align: center; margin-bottom: 1.5rem; }
  .logo h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; letter-spacing: -0.3px; }
  .logo p { font-size: 13px; color: #888; margin-top: 4px; }
  .oar { font-size: 32px; margin-bottom: 8px; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
  input[type=text] { width: 100%; border: 0.5px solid #d0d0c8; border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: inherit; background: #fafaf8; color: #1a1a1a; outline: none; letter-spacing: 1px; transition: border-color 0.15s; }
  input[type=text]:focus { border-color: #1e3a5f; background: #fff; }
  button { width: 100%; background: #1e3a5f; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; margin-top: 12px; transition: background 0.15s; }
  button:hover { background: #162d4a; }
  .error { color: #c53030; font-size: 13px; margin-top: 8px; display: none; }
  .hint { font-size: 12px; color: #aaa; margin-top: 8px; text-align: center; }

  /* Result view */
  .result { display: none; }
  .member-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 0.5px solid #e8e8e0; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: #e8f0fb; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 14px; color: #1e3a5f; flex-shrink: 0; }
  .member-name { font-size: 18px; font-weight: 500; color: #1a1a1a; }
  .member-squad { font-size: 13px; color: #888; margin-top: 2px; }
  .balance-card { border-radius: 12px; padding: 1.25rem; text-align: center; margin-bottom: 1.25rem; }
  .balance-card.outstanding { background: #fff8f0; border: 0.5px solid #f6d8b0; }
  .balance-card.settled { background: #f0faf4; border: 0.5px solid #b0dfc0; }
  .balance-card.credit { background: #f0f6ff; border: 0.5px solid #b0c8f0; }
  .balance-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .balance-amount { font-size: 36px; font-weight: 500; }
  .balance-card.outstanding .balance-amount { color: #c05000; }
  .balance-card.settled .balance-amount { color: #1a7a40; }
  .balance-card.credit .balance-amount { color: #1e5ab0; }
  .balance-sub { font-size: 13px; color: #888; margin-top: 4px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid #f0f0e8; font-size: 14px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .lbl { color: #666; }
  .summary-row .val { font-weight: 500; color: #1a1a1a; }
  .breakdown-title { font-size: 13px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin: 1.25rem 0 0.75rem; }
  .breakdown-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid #f4f4f0; font-size: 14px; }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row .item { color: #555; }
  .breakdown-row .amt { color: #1a1a1a; font-variant-numeric: tabular-nums; }
  .total-row { display: flex; justify-content: space-between; padding: 10px 0 0; font-size: 15px; font-weight: 500; border-top: 0.5px solid #d0d0c8; margin-top: 4px; }
  .contact-note { background: #f8f8f4; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #666; margin-top: 1.25rem; line-height: 1.5; }
  .back-btn { background: none; border: 0.5px solid #d0d0c8; color: #555; margin-top: 1rem; }
  .back-btn:hover { background: #f8f8f4; }
  .status-pill { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; margin-left: 8px; vertical-align: middle; }
  .pill-outstanding { background: #fff0e0; color: #a04000; }
  .pill-settled { background: #e8f8f0; color: #1a7a40; }
  .pill-credit { background: #e8f0ff; color: #1e5ab0; }
  @media (max-width: 500px) { .card { padding: 1.5rem; } .balance-amount { font-size: 28px; } }
</style>
</head>

function fmt(n) {
  return '£' + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function initials(name) {
  return name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
}

function login() {
  const pin = document.getElementById('pin').value.trim().toLowerCase();
  const err = document.getElementById('error-msg');
  if (!pin) { err.style.display = 'block'; err.textContent = 'Please enter your university username.'; return; }
  const member = DATA[pin];
  if (!member) { err.style.display = 'block'; err.textContent = 'Username not recognised. Please check and try again.'; return; }
  err.style.display = 'none';
  showResult(member);
}

document.getElementById('pin').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function showResult(m) {
  const bal = m.balance;
  const isCredit = bal < -0.5;
  const isSettled = !isCredit && bal <= 0.5;
  const balClass = isCredit ? 'credit' : isSettled ? 'settled' : 'outstanding';
  const pillClass = isCredit ? 'pill-credit' : isSettled ? 'pill-settled' : 'pill-outstanding';
  const pillText = isCredit ? 'In credit' : isSettled ? 'All paid up' : 'Outstanding';

  let bodyHTML = '';

  if (isSettled) {
    bodyHTML = `<div class="balance-card settled">
      <div class="balance-label">All paid up</div>
      <div class="balance-amount">£0.00</div>
    </div>
    <div class="contact-note">Your account is fully settled. Thank you!</div>`;
  } else if (isCredit) {
    bodyHTML = `<div class="balance-card credit">
      <div class="balance-label">Club owes you</div>
      <div class="balance-amount">${fmt(Math.abs(bal))}</div>
    </div>
    <div class="contact-note">You have a credit on your account. Your treasurer will be in touch about this.</div>`;
  } else {
    // Show balance + breakdown of what makes it up
    let itemsHTML = '';
    const items = m.debt_items || [];
    if (items.length > 0) {
      for (const item of items) {
        itemsHTML += `<div class="breakdown-row">
          <span class="item">${item.label}</span>
          <span class="amt">${fmt(item.amount)}</span>
        </div>`;
      }
    } else {
      // Fallback: show full breakdown
      for (const [key, val] of Object.entries(m.breakdown || {})) {
        if (val && val !== 0) {
          const isNeg = val < 0;
          itemsHTML += `<div class="breakdown-row">
            <span class="item" style="${isNeg?'font-style:italic;color:#666':''}">${key}</span>
            <span class="amt" style="${isNeg?'color:#1a7a40':''}">${isNeg?'–':''}${fmt(Math.abs(val))}${isNeg?' credit':''}</span>
          </div>`;
        }
      }
    }

    bodyHTML = `<div class="balance-card outstanding">
      <div class="balance-label">Amount outstanding</div>
      <div class="balance-amount">${fmt(bal)}</div>
    </div>
    <div class="breakdown-title">This balance is made up of</div>
    ${itemsHTML}
    <div class="contact-note">To pay, please bank transfer to the DUBC account:<br><strong>Sort code:</strong> 20–27–66<br><strong>Account number:</strong> 53697401<br>Use your name as the reference. Contact your treasurer with any questions.</div>`;
  }

  document.getElementById('result-view').innerHTML = `
    <div class="member-header">
      <div class="avatar">${initials(m.name)}</div>
      <div>
        <div class="member-name">${m.name} <span class="status-pill ${pillClass}">${pillText}</span></div>
        <div class="member-squad">${m.squad}</div>
      </div>
    </div>
    ${bodyHTML}
    <button class="back-btn" onclick="goBack()">Sign out</button>
  `;

  document.getElementById('login-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
}

function goBack() {
  document.getElementById('pin').value = '';
  document.getElementById('login-view').style.display = 'block';
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('result-view').innerHTML = '';
}
</script>
